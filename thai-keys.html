<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🇹🇭 Thai Keys</title>
<style>
  :root {
    --bg: #1e1e1e;
    --surface: #2a2a2a;
    --border: #383838;
    --text-muted: #666;
    --text-dim: #888;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--bg);
    min-height: 100dvh;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    overscroll-behavior: none;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px 10px 24px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 2px 12px;
  }
  .logo {
    font-size: 15px;
    font-weight: 700;
    color: #ccc;
    letter-spacing: .5px;
  }
  .logo span { opacity: .5; font-weight: 400; font-size: 12px; margin-left: 6px; }
  .gender-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 20px;
    padding: 3px;
    gap: 2px;
    border: 1px solid var(--border);
  }
  .gb {
    padding: 5px 14px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .gb.active { background: #484848; color: #eee; }

  /* ── Category tabs ── */
  .cat-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin-bottom: 10px;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-row {
    display: flex;
    gap: 6px;
    padding: 2px 1px 6px;
    width: max-content;
  }
  .cat-btn {
    padding: 6px 13px;
    border-radius: 20px;
    border: 1.5px solid transparent;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s;
    background: var(--surface);
    color: var(--text-muted);
    border-color: var(--border);
  }
  .cat-btn.active {
    color: #fff;
  }

  /* ── Count badge ── */
  .count-bar {
    font-size: 11px;
    color: var(--text-muted);
    padding: 0 2px 8px;
    letter-spacing: .3px;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }
  .key-wrap {
    aspect-ratio: 1 / 1;
    width: 100%;
    overflow: hidden;
  }
  .key {
    border-radius: var(--radius);
    padding: 0 5px;
    cursor: pointer;
    text-align: center;
    user-select: none;
    border: 1.5px solid transparent;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    width: 100%;
    height: 100%;
    transition: filter .1s, transform .08s;
    -webkit-user-select: none;
  }
  .key:active, .key.pressed {
    filter: brightness(1.35);
    transform: scale(.93);
  }
  .key-zh {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.1;
    word-break: keep-all;
  }
  .key-rom {
    font-size: 10px;
    opacity: .7;
    line-height: 1.3;
    word-break: break-all;
  }

  /* ── Status ── */
  .status {
    text-align: center;
    padding: 10px 8px 4px;
    font-size: 12px;
    color: var(--text-muted);
    min-height: 28px;
    letter-spacing: .3px;
  }
  .status .th-text {
    color: #aaa;
    font-size: 14px;
    display: block;
  }

  /* ── Category colors ── */
  /* Q 問候禮儀 – steel blue */
  .cat-Q { background:#1e2e3e; border-color:#2e5070; }
  .cat-Q .key-zh { color:#8ec8f0; }
  .cat-Q .key-rom { color:#5a9bc0; }
  .btn-Q { border-color:#2e5070 !important; }
  .btn-Q.active { background:#2e5070 !important; color:#8ec8f0 !important; }

  /* B 基本對話 – violet */
  .cat-B { background:#261e3a; border-color:#4a3070; }
  .cat-B .key-zh { color:#c4a0f0; }
  .cat-B .key-rom { color:#8a60c0; }
  .btn-B { border-color:#4a3070 !important; }
  .btn-B.active { background:#4a3070 !important; color:#c4a0f0 !important; }

  /* R 餐飲點餐 – amber */
  .cat-R { background:#332415; border-color:#6a4418; }
  .cat-R .key-zh { color:#f0c070; }
  .cat-R .key-rom { color:#c09040; }
  .btn-R { border-color:#6a4418 !important; }
  .btn-R.active { background:#6a4418 !important; color:#f0c070 !important; }

  /* S 購物殺價 – green */
  .cat-S { background:#1a2e1a; border-color:#2e5e2e; }
  .cat-S .key-zh { color:#90d890; }
  .cat-S .key-rom { color:#50a850; }
  .btn-S { border-color:#2e5e2e !important; }
  .btn-S.active { background:#2e5e2e !important; color:#90d890 !important; }

  /* T 交通移動 – teal */
  .cat-T { background:#162a2a; border-color:#1e5454; }
  .cat-T .key-zh { color:#70d8d0; }
  .cat-T .key-rom { color:#3aa8a0; }
  .btn-T { border-color:#1e5454 !important; }
  .btn-T.active { background:#1e5454 !important; color:#70d8d0 !important; }

  /* E 情緒感受 – pink */
  .cat-E { background:#2e1a28; border-color:#6a2a58; }
  .cat-E .key-zh { color:#f090c8; }
  .cat-E .key-rom { color:#c05090; }
  .btn-E { border-color:#6a2a58 !important; }
  .btn-E.active { background:#6a2a58 !important; color:#f090c8 !important; }

  /* ALL tab */
  .btn-ALL.active { background: #484848 !important; color: #eee !important; border-color: #666 !important; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">🇹🇭 Thai Keys <span>泰語速查</span></div>
    <div class="gender-toggle">
      <button class="gb active" id="bM" onclick="setG('m')">♂ 男</button>
      <button class="gb" id="bF" onclick="setG('f')">♀ 女</button>
    </div>
  </div>

  </div>

  <div class="grid" id="grid"></div>

let gender = 'm';
let curCat = 'ALL';
const synth = window.speechSynthesis;

function setG(g) {
  gender = g;
  document.getElementById('bM').className = 'gb' + (g==='m'?' active':'');
  document.getElementById('bF').className = 'gb' + (g==='f'?' active':'');
}

function speak(text, th, rom, keyEl) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'th-TH';
  utt.rate = 0.85;
  utt.pitch = gender === 'f' ? 1.25 : 0.88;
  const vs = synth.getVoices().filter(v => v.lang.startsWith('th'));
  if (vs.length) {
    utt.voice = gender === 'f'
      ? (vs.find(v => /female|woman/i.test(v.name)) || vs[vs.length-1])
      : (vs.find(v => /male|man/i.test(v.name)) || vs[0]);
  }
  keyEl.classList.add('pressed');
  utt.onend = () => keyEl.classList.remove('pressed');
  utt.onerror = () => keyEl.classList.remove('pressed');
  synth.speak(utt);
  const s = document.getElementById('status');
  s.innerHTML = `<span class="th-text">${th}</span>${rom}`;
}

function render() {
  const phrases = PHRASES.filter(p => curCat === 'ALL' || p.cat === curCat);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  phrases.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'key-wrap';
    const key = document.createElement('div');
    key.className = `key cat-${p.cat}`;
    key.innerHTML = `<span class="key-zh">${p.zh}</span><span class="key-rom">${p.rom}</span>`;
    key.addEventListener('click', () => speak(gender==='m'?p.m:p.f, p.th, p.rom, key));
    wrap.appendChild(key);
    grid.appendChild(wrap);
  });
  document.getElementById('countBar').textContent =
    CATS[curCat].name + '　' + phrases.length + ' 個詞彙';
}

function renderTabs() {
  const row = document.getElementById('catRow');
  row.innerHTML = '';
  Object.entries(CATS).forEach(([k, v]) => {
    const btn = document.createElement('button');
    btn.className = `cat-btn btn-${k}` + (curCat===k?' active':'');
    btn.textContent = v.name;
    btn.onclick = () => { curCat = k; renderTabs(); render(); };
    row.appendChild(btn);
  });
}

renderTabs();
render();
setTimeout(() => synth.getVoices(), 200);
if (speechSynthesis.onvoiceschanged !== undefined)
  speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
